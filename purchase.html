        <h1>Order Overview: </h1>
        <h3 id="total">Total Amount Payable: Rs.0</h3>
        <h2>Select a payment method:</h2>

        <!-- UPI Section with Radio Buttons -->
        <div class="cardpayment">
            <h5>Pay via UPI </h5>
   
                  <tr><input type="radio" name="payment">  Google Pay <i class="fa-brands fa-google-pay"></i></tr>
                 <tr><input type="radio" name="payment">   Amazon Pay   <i class="fa-brands fa-amazon-pay"></i><tr>
                    <tr><input type="radio" name="payment">  PhonePe  <i class="fa-brands fa-paypal"></i></tr>
            
                  <tr><input type="radio" name="payment" value="others" id="others">
                     Others<input type="text" placeholder="Enter Your UPI-ID" class="input-upi" id="upi"></tr>
        </div>
 
        <br>
        <!-- Card Payment Section -->
        <div class="cardpayment">
            <h5>Pay via Card 
                <i class="fa-brands fa-cc-visa" style="color: #1a1f71;"></i> 
                <i class="fa-brands fa-cc-mastercard" style="color: #f79e1b"></i>
            </h5>
            <div class="card-type-select">
                <tr><input type="radio" name="payment" value="debit"><label> Debit Card</label></tr>
                <tr><input type="radio" name="payment" value="Credit"><label> Credit Card </label></tr>
            </div>
          <div class="details">
            <h4>Provide your card details:</h4>
            <input type="text" placeholder="Card holder name" class="full-width">
            <input type="text" placeholder="Card number" class="full-width">
            <input type="text" placeholder="MM/YY" class="full-width">
            <input type="text" placeholder="CVV" class="full-width">
          </div>
        </div>

        <!-- COD Section -->

            <h3><label><input type="radio" name="payment" value="COD"> Cash on Delivery <i class="fa-solid fa-wallet" style="color: #f79e1b;"></i></label>
            </h3> 

        <button class="pay-btn" id="pay"><a href="feedback.html">Proceed to Pay:Rs 0</a></button>
         <button><a href="https://forms.gle/34dS29H6S5AZjKF7A">Give us feedback⭐</a></button>


<script>
    function displayFinalTotal() {
        const prices = {
            classicspoon: 30, chocolatespoon: 35,
            classicfork: 30, chocolatefork: 35,
            classicbowl: 60, chocolatebowl: 70,
            classicset: 100, chocolateset: 120
        };

            const total = 
            (parseInt(localStorage.getItem('classicspoonCount')) || 0) * prices.classicspoon +
            (parseInt(localStorage.getItem('chocolatespoonCount')) || 0) * prices.chocolatespoon +
            (parseInt(localStorage.getItem('classicforkCount')) || 0) * prices.classicfork +
            (parseInt(localStorage.getItem('chocolateforkCount')) || 0) * prices.chocolatefork +
            (parseInt(localStorage.getItem('classicbowlCount')) || 0) * prices.classicbowl +
            (parseInt(localStorage.getItem('chocolatebowlCount')) || 0) * prices.chocolatebowl +
            (parseInt(localStorage.getItem('classicsetCount')) || 0) * prices.classicset +
            (parseInt(localStorage.getItem('chocolatesetCount')) || 0) * prices.chocolateset;

        document.getElementById("total").innerText = "Total Amount Payable: Rs." + total;
        document.getElementById("pay").innerText = "Proceed to Pay: Rs." + total;
    }
    document.getElementById("pay").onclick = () =>{
      alert("Congratulation Order recorded successfully🎉🎉!!")
      
    }
    window.onload = displayFinalTotal;
    document.getElementById("others").onchange = () => {
      document.getElementById("others").style.display = none;
      document.getElementById("upi").style.display = block;
    }
</script>
